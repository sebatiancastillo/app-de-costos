<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vikingos — Módulo de Cotizaciones</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #e8a84c;
      --primary-dark: #b07a2c;
      --secondary: #333;
      --success: #5cb88a;
      --error: #e05c5c;
      --warning: #f97316;
      --info: #6366f1;
      --bg: #13100d;
      --surface: #1e1710;
      --card: #282015;
      --border: #4a3520;
      --text: #f0e2cc;
      --text-muted: #7a6850;
      --pending: #f0b960;
      --sent: #5cb88a;
      --approved: #6366f1;
      --production: #f97316;
      --completed: #10b981;
      --archived: #6b7280;
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    /* ── Buttons ── */
    .btn-primary, .btn-secondary, .btn-sm {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--primary);
      color: var(--secondary);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(232, 168, 76, 0.3);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      color: var(--text);
      border-color: var(--text-muted);
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
      margin-right: 4px;
    }

    .btn-add-item {
      margin-top: 10px;
      padding: 10px 16px;
      background: var(--primary);
      color: var(--secondary);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    /* ── Filtros ── */
    .filters {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filters input, .filters select {
      padding: 10px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
    }

    /* ── Quotation List ── */
    .quotations-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 16px;
      margin-bottom: 30px;
    }

    .quotation-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.2s;
      cursor: pointer;
    }

    .quotation-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      border-color: var(--primary);
    }

    .card-header {
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .card-left {
      flex: 1;
    }

    .estimate-number {
      font-size: 16px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 4px;
    }

    .client-name {
      font-size: 14px;
      color: var(--text);
    }

    .card-right {
      text-align: right;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .status-pending { background: rgba(240, 185, 96, 0.2); color: var(--pending); }
    .status-sent { background: rgba(92, 184, 138, 0.2); color: var(--sent); }
    .status-approved { background: rgba(99, 102, 241, 0.2); color: var(--approved); }
    .status-production { background: rgba(249, 115, 22, 0.2); color: var(--production); }
    .status-completed { background: rgba(16, 185, 129, 0.2); color: var(--completed); }
    .status-archived { background: rgba(107, 114, 128, 0.2); color: var(--archived); }

    .total-amount {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
    }

    .card-body {
      padding: 12px 16px;
    }

    .project-name {
      font-size: 13px;
      color: var(--text);
      margin-bottom: 4px;
    }

    .date-created {
      font-size: 11px;
      color: var(--text-muted);
    }

    .card-footer {
      padding: 12px 16px;
      display: flex;
      gap: 6px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    .btn-edit, .btn-view, .btn-delete {
      flex: 1;
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-edit {
      background: var(--primary);
      color: var(--secondary);
    }

    .btn-view {
      background: var(--info);
      color: white;
    }

    .btn-delete {
      background: var(--error);
      color: white;
    }

    /* ── Form ── */
    .quotation-form {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      max-width: 900px;
    }

    .form-section {
      margin-bottom: 24px;
    }

    .form-section h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--primary);
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .form-group label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    .form-group input, .form-group select, .form-group textarea {
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(232, 168, 76, 0.1);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    /* ── Items List ── */
    .item-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .item-content {
      flex: 1;
    }

    .item-desc {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .item-details {
      font-size: 12px;
      color: var(--text-muted);
    }

    .item-actions {
      display: flex;
      gap: 8px;
    }

    .btn-edit-item, .btn-delete-item {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background 0.2s;
    }

    .btn-edit-item:hover { background: rgba(99, 102, 241, 0.2); }
    .btn-delete-item:hover { background: rgba(224, 92, 92, 0.2); }

    /* ── Preview ── */
    .quotation-preview {
      background: white;
      color: #333;
      padding: 40px;
      border-radius: 12px;
      max-width: 900px;
      margin: 0 auto;
    }

    .preview-header {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
      border-bottom: 2px solid #ddd;
      padding-bottom: 20px;
    }

    .preview-logo h1 {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary);
    }

    .preview-title {
      text-align: right;
    }

    .preview-title h2 {
      font-size: 20px;
      color: #333;
    }

    .preview-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
      background: #f9f9f9;
      padding: 16px;
      border-radius: 8px;
    }

    .info-section h3 {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 10px;
      color: var(--primary);
    }

    .info-section p {
      font-size: 13px;
      margin-bottom: 6px;
    }

    .items-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }

    .items-table th {
      background: var(--surface);
      color: #fff;
      padding: 10px;
      text-align: left;
      font-weight: 600;
      border-bottom: 2px solid var(--primary);
    }

    .items-table td {
      padding: 12px 10px;
      border-bottom: 1px solid #ddd;
    }

    .items-table tbody tr:hover {
      background: #f9f9f9;
    }

    .preview-financials {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 30px;
    }

    .financials-summary {
      width: 100%;
      max-width: 350px;
      background: #f9f9f9;
      padding: 16px;
      border-radius: 8px;
    }

    .financial-line {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .financial-total {
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 2px solid var(--primary);
      font-weight: 700;
      font-size: 16px;
      color: var(--primary);
    }

    .preview-notes {
      background: #f0f9ff;
      padding: 16px;
      border-left: 4px solid var(--info);
      border-radius: 4px;
      margin-bottom: 20px;
    }

    .preview-footer {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      padding-top: 20px;
      border-top: 1px solid #ddd;
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--text);
    }

    .modal-body {
      padding: 20px;
    }

    .modal-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    /* ── Notifications ── */
    .notification {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 16px 24px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      animation: slideIn 0.3s ease-out;
      z-index: 2000;
      max-width: 400px;
    }

    .notification-success { background: var(--success); }
    .notification-error { background: var(--error); }
    .notification-warning { background: var(--warning); }
    .notification-info { background: var(--info); }

    .notification-close {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      font-size: 18px;
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* ── Utilities ── */
    .no-items {
      text-align: center;
      color: var(--text-muted);
      padding: 20px;
      font-style: italic;
    }

    @media (max-width: 768px) {
      .quotations-grid {
        grid-template-columns: 1fr;
      }
      
      .form-row {
        grid-template-columns: 1fr;
      }

      .preview-header, .preview-info {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div class="app-layout">
<aside class="sidebar" id="sidebar"></aside>
<main class="main-area">
<div class="container">
  <div class="header">
    <h1>📋 Cotizaciones</h1>
    <div class="header-actions">
      <button class="btn-primary" id="newQuotationBtn">+ Nueva Cotización</button>
      <button class="btn-secondary" id="exportBtn">Exportar</button>
      <button class="btn-secondary" id="backupBtn">Backup</button>
    </div>
  </div>

  <div id="contentArea"></div>
</div>

<!-- Scripts -->
<script src="../shared/storage.js"></script>
<script src="../shared/utils.js"></script>
<script src="../shared/pdf.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
  class QuotationApp {
    constructor() {
      this.storage = new QuotationStorage();
      this.quotations = [];
      this.currentId = 1;
      this.currentView = 'list';
      this.currentQuotationId = null;
      this.init();
    }

    init() {
      this.loadFromStorage();
      this.attachGlobalEventHandlers();
      this.renderList();
    }

    loadFromStorage() {
      this.quotations = this.storage.getAllQuotations();
      if (this.quotations.length > 0) {
        this.currentId = Math.max(...this.quotations.map(q => q.id)) + 1;
      }
    }

    getQuotation(id) {
      return this.quotations.find(q => q.id === id);
    }

    getAllQuotations() {
      return this.quotations;
    }

    saveQuotation(id, data) {
      let quotation;
      if (id) {
        const idx = this.quotations.findIndex(q => q.id === id);
        if (idx === -1) return null;
        this.quotations[idx] = { ...this.quotations[idx], ...data, updatedDate: new Date().toISOString() };
        quotation = this.quotations[idx];
      } else {
        quotation = { id: this.currentId++, ...data, createdDate: new Date().toISOString(), updatedDate: new Date().toISOString(), items: [], financials: { subtotal: 0, overheadPercentage: 15, overheadAmount: 0, marginPercentage: 30, marginAmount: 0, total: 0 } };
        this.quotations.unshift(quotation);
      }
      this.storage.saveQuotation(quotation);
      return quotation;
    }

    deleteQuotation(id) {
      this.quotations = this.quotations.filter(q => q.id !== id);
      this.storage.deleteQuotation(id);
    }

    searchAndFilter(searchTerm, status) {
      let result = this.quotations;
      if (searchTerm) result = QuotationUtils.searchQuotations(result, searchTerm);
      if (status) result = result.filter(q => q.status === status);
      return result;
    }

    renderList() {
      const container = document.getElementById('contentArea');
      container.innerHTML = `
        <div class="filters">
          <input type="text" id="searchInput" placeholder="🔍 Buscar por cliente o proyecto..." oninput="quotationApp.applyFilters()"/>
          <select id="statusFilter" onchange="quotationApp.applyFilters()">
            <option value="">Todos los estados</option>
            <option value="pending">Pendiente</option>
            <option value="sent">Enviada</option>
            <option value="approved">Aprobada</option>
            <option value="production">En Producción</option>
            <option value="completed">Finalizada</option>
            <option value="archived">Archivada</option>
          </select>
        </div>
        <div id="quotationsList" class="quotations-grid"></div>`;
      this.renderQuotationsList(document.getElementById('quotationsList'), this.quotations);
    }

    renderQuotationsList(container, quotations) {
      if (quotations.length === 0) {
        container.innerHTML = '<div class="empty"><br/><br/><p style="text-align:center;color:#999;">Sin cotizaciones. Crea una nueva.</p></div>';
        return;
      }
      container.innerHTML = quotations.map(q => {
        const statusLabels = { pending: 'Pendiente', sent: 'Enviada', approved: 'Aprobada', production: 'Producción', completed: 'Finalizada', archived: 'Archivada' };
        return `<div class="quotation-card" data-id="${q.id}">
          <div class="card-header">
            <div class="card-left">
              <h3 class="estimate-number">${q.estimateNumber || '#'+q.id}</h3>
              <p class="client-name">${q.client?.name || '—'}</p>
            </div>
            <div class="card-right">
              <span class="status-badge status-${q.status}">${statusLabels[q.status] || q.status}</span>
              <p class="total-amount">$${QuotationUtils.formatCurrency(q.financials?.total || 0)}</p>
            </div>
          </div>
          <div class="card-body">
            <p class="project-name">${q.project?.name || '—'}</p>
            <p class="date-created">${QuotationUtils.formatDateShort(q.createdDate)}</p>
          </div>
          <div class="card-footer">
            <button class="btn-sm btn-edit" onclick="quotationApp.renderForm(${q.id})">✏️ Editar</button>
            <button class="btn-sm btn-view" onclick="quotationApp.renderPreview(${q.id})">👁️ Ver</button>
            <button class="btn-sm btn-delete" onclick="if(confirm('¿Eliminar?'))quotationApp.deleteQuotation(${q.id});quotationApp.renderList();">🗑️</button>
          </div>
        </div>`;
      }).join('');
    }

    renderForm(quotationId = null) {
      const container = document.getElementById('contentArea');
      const q = quotationId ? this.getQuotation(quotationId) : null;
      const c = q ? q.client || {} : {};
      const p = q ? q.project || {} : {};
      this.currentQuotationId = quotationId;

      container.innerHTML = `
        <div class="quotation-form">
          <h2>${quotationId ? 'Editar' : 'Nueva'} Cotización</h2>
          <div class="form-section"><h3>Cliente</h3>
            <input id="fName" placeholder="Nombre" value="${c.name || ''}"/>
            <input id="fEmail" placeholder="Email" value="${c.email || ''}"/>
            <input id="fPhone" placeholder="Teléfono" value="${c.phone || ''}"/>
            <input id="fAddress" placeholder="Dirección" value="${c.address || ''}"/>
            <input id="fCity" placeholder="Ciudad" value="${c.city || ''}"/>
            <input id="fCompany" placeholder="Empresa" value="${c.company || ''}"/>
          </div>
          <div class="form-section"><h3>Proyecto</h3>
            <input id="fProjName" placeholder="Nombre del proyecto" value="${p.name || ''}"/>
            <select id="fCategory"><option value="closet" ${p.category==='closet'?'selected':''}>Closet</option><option value="mesa" ${p.category==='mesa'?'selected':''}>Mesa</option><option value="cocina" ${p.category==='cocina'?'selected':''}>Cocina</option><option value="otro" ${p.category==='otro'?'selected':''}>Otro</option></select>
            <textarea id="fDescription" placeholder="Descripción">${p.description || ''}</textarea>
            <input id="fDelivery" type="number" placeholder="Días entrega" value="${p.deliveryDays || 15}"/>
          </div>
          <button class="btn-primary" onclick="quotationApp.saveForm()">💾 Guardar</button>
          <button class="btn-secondary" onclick="quotationApp.renderList()">← Volver</button>
        </div>`;
    }

    saveForm() {
      const id = this.currentQuotationId;
      const data = {
        client: { name: document.getElementById('fName').value, email: document.getElementById('fEmail').value, phone: document.getElementById('fPhone').value, address: document.getElementById('fAddress').value, city: document.getElementById('fCity').value, company: document.getElementById('fCompany').value },
        project: { name: document.getElementById('fProjName').value, category: document.getElementById('fCategory').value, description: document.getElementById('fDescription').value, deliveryDays: parseInt(document.getElementById('fDelivery').value) || 15 },
        status: id ? this.getQuotation(id)?.status || 'pending' : 'pending'
      };
      this.saveQuotation(id, data);
      this.renderList();
    }

    renderPreview(quotationId) {
      const container = document.getElementById('contentArea');
      const q = this.getQuotation(quotationId);
      if (!q) return;
      const f = q.financials || {};
      container.innerHTML = `
        <div style="margin-bottom:20px;">
          <button class="btn-secondary" onclick="quotationApp.renderList()">← Volver</button>
          <button class="btn-primary" id="downloadBtn" style="margin-left:10px;">📥 PDF</button>
          <button class="btn-primary" id="shareBtn" style="margin-left:10px;">📤 Compartir</button>
        </div>
        <div class="quotation-preview">
          <h2>${q.estimateNumber || '#'+q.id}</h2>
          <p><strong>${q.client?.name || '—'}</strong></p>
          <p>${q.project?.name || '—'}</p>
          <hr/>
          <p>Total: <strong>$${QuotationUtils.formatCurrency(f.total || 0)}</strong></p>
          <p>Estado: ${q.status}</p>
        </div>`;

      document.getElementById('downloadBtn').onclick = () => { new QuotationPDFGenerator().generatePDF(q); };
      document.getElementById('shareBtn').onclick = () => {
        const text = 'Cotización ' + (q.estimateNumber || '#'+q.id) + ' - Total: $' + QuotationUtils.formatCurrency(f.total || 0);
        if (navigator.share) navigator.share({ title: 'Cotización Vikingos', text, url: location.href }).catch(()=>{});
        else { QuotationUtils.copyToClipboard(text); }
      };
    }

    attachGlobalEventHandlers() {
      document.getElementById('newQuotationBtn').onclick = () => this.renderForm();
      document.getElementById('exportBtn').onclick = () => {
        const json = this.storage.exportAsJSON();
        QuotationUtils.downloadFile('cotizaciones.json', json, 'application/json');
      };
      document.getElementById('backupBtn').onclick = () => {
        const backup = this.storage.createBackup();
        QuotationUtils.downloadFile('backup-' + new Date().toISOString().split('T')[0] + '.json', backup, 'application/json');
      };
    }

    applyFilters() {
      const search = document.getElementById('searchInput').value;
      const status = document.getElementById('statusFilter').value;
      const filtered = this.searchAndFilter(search, status);
      this.renderQuotationsList(document.getElementById('quotationsList'), filtered);
    }
  }

  window.quotationApp = new QuotationApp();
</script>
<script src="../config/routes.js"></script>
<script src="../components/navbar.js"></script>
<script>renderSidebar('cotizaciones');</script>
</main>
