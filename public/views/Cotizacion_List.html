<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vikingos — Cotizaciones</title>
  <link rel="stylesheet" href="../styles/base.css"/>
  <link rel="stylesheet" href="../styles/layout.css"/>
  <link rel="stylesheet" href="../styles/components.css"/>
  <style>
    .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .filtros-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .filtro-select { background: var(--card); border: 1px solid var(--border); color: var(--cream); padding: 8px 12px; border-radius: 8px; font-size: 13px; }
    .filtro-input { background: var(--card); border: 1px solid var(--border); color: var(--cream); padding: 8px 12px; border-radius: 8px; font-size: 13px; }
    .filtro-input:focus { border-color: var(--amber); outline: none; }
    
    .stats-bar { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px; display: flex; align-items: center; gap: 10px; }
    .stat-icon { font-size: 20px; }
    .stat-info { display: flex; flex-direction: column; }
    .stat-val { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700; color: var(--cream); }
    .stat-lbl { font-size: 11px; color: var(--muted); }

    .cotiz-list { display: grid; gap: 12px; }
    .cotiz-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; transition: all 0.2s; }
    .cotiz-card:hover { border-color: var(--amber-dim); transform: translateY(-2px); }
    .cotiz-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .cotiz-titulo { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--cream); }
    .cotiz-id { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
    .cotiz-estado { font-size: 12px; padding: 4px 10px; border-radius: 20px; font-weight: 600; display: inline-flex; align-items: center; gap: 5px; }
    .cotiz-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 12px; }
    .cotiz-info-item { font-size: 12px; }
    .cotiz-info-item span { color: var(--muted); display: block; font-size: 10px; text-transform: uppercase; }
    .cotiz-total { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700; color: var(--amber); }
    .cotiz-actions { display: flex; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); flex-wrap: wrap; }
    .btn-estado { font-size: 11px; padding: 5px 10px; }
    .btn-edit { background: var(--amber); color: #13100d; }
    .btn-duplicar { background: var(--card2); color: var(--cream); border: 1px solid var(--border); }
    .btn-eliminar { background: transparent; color: var(--danger); border: 1px solid var(--danger); }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
    .modal-title { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--cream); margin-bottom: 16px; }
    .modal-body { margin-bottom: 16px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-title { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--cream); margin-bottom: 8px; }
    .empty-sub { color: var(--muted); font-size: 14px; }

    .alertas-bar { background: rgba(232,168,76,0.1); border: 1px solid var(--amber); border-radius: 10px; padding: 12px 16px; margin-bottom: 20px; display: none; }
    .alertas-bar.show { display: block; }
    .alerta-item { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--cream); padding: 6px 0; }
    .alerta-icon { font-size: 16px; }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-area">
    <div class="topbar">
      <div>
        <div class="page-title">Cotizaciones</div>
        <div class="page-sub" id="subtitulo">Gestión de proyectos</div>
      </div>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-ghost" onclick="CotizacionController.migrarDesdeLegacy()">🔄 Migrar datos</button>
        <a href="../pages/html/cotizar.html" class="btn btn-primary">+ Nueva Cotización</a>
      </div>
    </div>

    <div class="content">
      <!-- ALERTAS -->
      <div class="alertas-bar" id="alertasBar"></div>

      <!-- ESTADÍSTICAS -->
      <div class="stats-bar" id="statsBar"></div>

      <!-- FILTROS -->
      <div class="filtros-row">
        <select class="filtro-select" id="filtroEstado" onchange="aplicarFiltros()">
          <option value="">Todos los estados</option>
          <option value="pendiente">📋 Pendiente</option>
          <option value="enviada">📤 Enviada</option>
          <option value="aprobada">✅ Aprobada</option>
          <option value="produccion">🔧 Producción</option>
          <option value="finalizada">🏁 Finalizada</option>
          <option value="archivada">📦 Archivada</option>
          <option value="rechazada">❌ Rechazada</option>
        </select>
        <input type="text" class="filtro-input" id="filtroCliente" placeholder="Buscar cliente..." oninput="aplicarFiltros()"/>
        <input type="date" class="filtro-input" id="filtroFechaDesde" onchange="aplicarFiltros()"/>
        <input type="date" class="filtro-input" id="filtroFechaHasta" onchange="aplicarFiltros()"/>
        <button class="btn btn-ghost" onclick="limpiarFiltros()">Limpiar</button>
      </div>

      <!-- LISTADO -->
      <div class="cotiz-list" id="cotizList"></div>
    </div>
  </main>
</div>

<!-- MODAL CONFIRMACIÓN -->
<div class="modal-overlay" id="modalConfirm">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Confirmar acción</div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-primary" id="modalBtnConfirm">Confirmar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../config/routes.js"></script>
<script src="../shared/navbar.js"></script>
<script src="../modules/cotizaciones/Cotizacion.model.js"></script>
<script src="../modules/cotizaciones/Cotizacion.controller.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="../shared/pdf.js"></script>
<script>
  renderSidebar('cotizaciones');

  const fmt = n => '$ ' + Math.round(n).toLocaleString('es-CO');

  function mostrarToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  function mostrarAlertas() {
    const alertas = CotizacionController.obtenerAlertas();
    const bar = document.getElementById('alertasBar');
    
    if (alertas.length === 0) {
      bar.classList.remove('show');
      return;
    }

    bar.classList.add('show');
    bar.innerHTML = alertas.slice(0, 3).map(a => `
      <div class="alerta-item">
        <span class="alerta-icon">${a.tipo === 'warning' ? '⚠️' : a.tipo === 'info' ? 'ℹ️' : '🔔'}</span>
        <span>${a.mensaje}</span>
      </div>
    `).join('');
  }

  function mostrarEstadisticas() {
    const stats = CotizacionController.obtenerEstadisticas();
    const bar = document.getElementById('statsBar');
    
    bar.innerHTML = `
      <div class="stat-card">
        <div class="stat-icon">📋</div>
        <div class="stat-info">
          <div class="stat-val">${stats.total}</div>
          <div class="stat-lbl">Total cotizaciones</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💰</div>
        <div class="stat-info">
          <div class="stat-val">${fmt(stats.totalMonto)}</div>
          <div class="stat-lbl">Monto total</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📊</div>
        <div class="stat-info">
          <div class="stat-val">${fmt(stats.promedioMonto)}</div>
          <div class="stat-lbl">Promedio</div>
        </div>
      </div>
    `;
  }

  function aplicarFiltros() {
    const criterios = {
      estado: document.getElementById('filtroEstado').value,
      cliente: document.getElementById('filtroCliente').value,
      fechaDesde: document.getElementById('filtroFechaDesde').value,
      fechaHasta: document.getElementById('filtroFechaHasta').value
    };

    const filtradas = CotizacionController.filtrar(criterios);
    renderizarListado(filtradas);
    document.getElementById('subtitulo').textContent = `${filtradas.length} cotización${filtradas.length !== 1 ? 'es' : ''}`;
  }

  function limpiarFiltros() {
    document.getElementById('filtroEstado').value = '';
    document.getElementById('filtroCliente').value = '';
    document.getElementById('filtroFechaDesde').value = '';
    document.getElementById('filtroFechaHasta').value = '';
    aplicarFiltros();
  }

  function renderizarListado(cotizaciones) {
    const container = document.getElementById('cotizList');
    
    if (cotizaciones.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <div class="empty-title">Sin cotizaciones</div>
          <div class="empty-sub">Crea una nueva cotización o ajusta los filtros</div>
          <br><a href="../pages/html/cotizar.html" class="btn btn-primary" style="margin-top:16px;">+ Nueva Cotización</a>
        </div>
      `;
      return;
    }

    container.innerHTML = cotizaciones.map(c => {
      const estadoCfg = CotizacionModel.getEstadoConfig(c.estado);
      const siguiente = FLUJO_ESTADOS[c.estado]?.[0];
      const puedeEditar = CotizacionModel.puedeEditar(c);
      const fecha = new Date(c.fechaCreacion).toLocaleDateString('es-CO');

      return `
        <div class="cotiz-card">
          <div class="cotiz-card-header">
            <div>
              <div class="cotiz-titulo">${c.proyecto}</div>
              <div class="cotiz-id">#${c.id} · ${fecha}</div>
            </div>
            <span class="cotiz-estado" style="background:${estadoCfg.color}22;color:${estadoCfg.color};border:1px solid ${estadoCfg.color}44;">
              ${estadoCfg.icon} ${estadoCfg.label}
            </span>
          </div>
          
          <div class="cotiz-info">
            <div class="cotiz-info-item">
              <span>Cliente</span>
              ${c.cliente || '—'}
            </div>
            <div class="cotiz-info-item">
              <span>Categoría</span>
              ${c.categoria || 'otro'}
            </div>
            <div class="cotiz-info-item">
              <span>Entrega</span>
              ${c.tiempoEntrega || '—'} días
            </div>
          </div>

          <div class="cotiz-total">${fmt(c.costos?.total || 0)}</div>

          <div class="cotiz-actions">
            ${puedeEditar ? `
              <button class="btn btn-sm btn-edit" onclick="editarCotizacion(${c.id})">✏️ Editar</button>
            ` : ''}
            
            ${siguiente ? `
              <button class="btn btn-sm btn-primary" onclick="avanzarEstado(${c.id}, '${siguiente}')">
                ${ESTADOS[siguiente.toUpperCase()]?.icon || '→'} ${ESTADOS[siguiente.toUpperCase()]?.label || 'Avanzar'}
              </button>
            ` : ''}

            <button class="btn btn-sm btn-duplicar" onclick="duplicarCotizacion(${c.id})">📋 Duplicar</button>
            
            <button class="btn btn-sm" style="background:var(--card2);color:var(--cream);border:1px solid var(--border);" onclick="verDetalle(${c.id})">
              👁️ Ver
            </button>

            <button class="btn btn-sm" style="background:#e05c5c22;color:#e05c5c;border:1px solid #e05c5c44;" onclick="exportarPDF(${c.id})">
              📄 PDF
            </button>
            
            <button class="btn btn-sm btn-eliminar" onclick="eliminarCotizacion(${c.id})">🗑️</button>
          </div>
        </div>
      `;
    }).join('');
  }

  function editarCotizacion(id) {
    window.location.href = `../pages/html/cotizar.html?edit=${id}`;
  }

  function duplicarCotizacion(id) {
    const result = CotizacionController.duplicar(id);
    if (result.success) {
      mostrarToast('✅ Cotización duplicada');
      aplicarFiltros();
    } else {
      mostrarToast('❌ ' + result.error);
    }
  }

  function avanzarEstado(id, nuevoEstado) {
    const result = CotizacionController.cambiarEstado(id, nuevoEstado);
    if (result.success) {
      mostrarToast(`✅ Cambió a ${ESTADOS[nuevoEstado.toUpperCase()]?.label || nuevoEstado}`);
      aplicarFiltros();
    } else {
      mostrarToast('❌ ' + result.error);
    }
  }

  function verDetalle(id) {
    const c = CotizacionController.obtenerPorId(id);
    if (!c) return;

    const estadoCfg = CotizacionModel.getEstadoConfig(c.estado);
    const fecha = new Date(c.fechaCreacion).toLocaleString('es-CO');
    const estadoInfo = `
      Creada: ${new Date(c.fechaCreacion).toLocaleDateString('es-CO')}
      ${c.fechaEnvio ? `<br>Enviada: ${new Date(c.fechaEnvio).toLocaleDateString('es-CO')}` : ''}
      ${c.fechaAprobacion ? `<br>Aprobada: ${new Date(c.fechaAprobacion).toLocaleDateString('es-CO')}` : ''}
      ${c.fechaProduccion ? `<br>Producción: ${new Date(c.fechaProduccion).toLocaleDateString('es-CO')}` : ''}
    `;

    document.getElementById('modalTitle').textContent = c.proyecto;
    document.getElementById('modalBody').innerHTML = `
      <div style="margin-bottom:16px;">
        <span class="cotiz-estado" style="background:${estadoCfg.color}22;color:${estadoCfg.color};border:1px solid ${estadoCfg.color}44;">
          ${estadoCfg.icon} ${estadoCfg.label}
        </span>
      </div>
      <div style="display:grid;gap:12px;font-size:14px;">
        <div><strong>Cliente:</strong> ${c.cliente || '—'}</div>
        <div><strong>Teléfono:</strong> ${c.telefono || '—'}</div>
        <div><strong>Dirección:</strong> ${c.direccion || '—'}</div>
        <div><strong>Descripción:</strong> ${c.descripcion || '—'}</div>
        <div style="border-top:1px solid var(--border);padding-top:12px;">
          <strong>Costos:</strong><br>
          Materiales: ${fmt(c.costos?.materiales || 0)}<br>
          Mano de obra: ${fmt(c.costos?.manoObra || 0)}<br>
          Overhead: ${fmt(c.costos?.overheadMonto || 0)}<br>
          Margen: ${fmt(c.costos?.margenMonto || 0)}<br>
          <strong style="color:var(--amber);font-size:18px;">Total: ${fmt(c.costos?.total || 0)}</strong>
        </div>
        <div style="color:var(--muted);font-size:12px;">${estadoInfo}</div>
      </div>
    `;

    document.getElementById('modalConfirm').classList.add('show');
    document.getElementById('modalBtnConfirm').textContent = 'Cerrar';
    document.getElementById('modalBtnConfirm').onclick = cerrarModal;
  }

  function eliminarCotizacion(id) {
    document.getElementById('modalTitle').textContent = '¿Eliminar cotización?';
    document.getElementById('modalBody').textContent = 'Esta acción no se puede deshacer.';
    document.getElementById('modalConfirm').classList.add('show');
    document.getElementById('modalBtnConfirm').textContent = 'Eliminar';
    document.getElementById('modalBtnConfirm').onclick = () => {
      const result = CotizacionController.eliminar(id);
      if (result.success) {
        mostrarToast('🗑️ Cotización eliminada');
        aplicarFiltros();
      } else {
        mostrarToast('❌ ' + result.error);
      }
      cerrarModal();
    };
  }

  function exportarPDF(id) {
    const c = CotizacionController.obtenerPorId(id);
    if (!c) {
      mostrarToast('❌ Cotización no encontrada');
      return;
    }
    PDFGenerator.generarCotizacion(c);
    mostrarToast('📄 Generando PDF...');
  }

  function cerrarModal() {
    document.getElementById('modalConfirm').classList.remove('show');
  }

  // INICIALIZAR
  mostrarAlertas();
  mostrarEstadisticas();
  aplicarFiltros();
</script>

</body>
</html>
