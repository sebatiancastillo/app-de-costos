<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../components/estilos/formulario.css">
</head>
<body>
    <div class="cotizacion-container">
    <h2>Solicitud de Cotización</h2>

    <form id="cotizacionForm">

        <h3>Datos del Cliente</h3>
        <label>Nombre completo</label>
        <input type="text" name="nombre" required>

        <label>WhatsApp</label>
        <input type="text" name="telefono" required>

        <label>Correo electrónico (opcional)</label>
        <input type="email" name="correo">

        <label>Ciudad</label>
        <input type="text" name="ciudad">

        <h3>Detalles del Mueble</h3>

        <label>Tipo de mueble</label>
        <select name="tipo" required>
            <option value="">Selecciona...</option>
            <option>Repisas</option>
            <option>Clóset</option>
            <option>Escritorio</option>
            <option>Cocina</option>
            <option>Comedor</option>
            <option>Mueble TV</option>
            <option>Otro</option>
        </select>

        <label>Material</label>
        <select name="material" required>
            <option value="">Selecciona...</option>
            <option>Melamina</option>
            <option>Madera sólida</option>
            <option>MDF</option>
            <option>Triplex</option>
        </select>

        <label>Color / Acabado</label>
        <input type="text" name="acabado">

        <div class="medidas-grid">
            <div>
                <label>Ancho (cm)</label>
                <input type="number" name="ancho">
            </div>
            <div>
                <label>Alto (cm)</label>
                <input type="number" name="alto">
            </div>
            <div>
                <label>Fondo (cm)</label>
                <input type="number" name="fondo">
            </div>
        </div>

        <label>Descripción del proyecto</label>
        <textarea name="descripcion" rows="4"></textarea>

        <label>Subir imagen o referencia</label>
        <input type="file" name="foto" accept="image/*">

        <h3>Extras</h3>

        <label>Urgencia del pedido</label>
        <select name="urgencia">
            <option>Normal</option>
            <option>Rápido (costo adicional)</option>
        </select>

        <label>¿Necesita instalación?</label>
        <select name="instalacion">
            <option>No</option>
            <option>Sí</option>
        </select>

        <button type="submit">Enviar cotización</button>
    </form>
</div>
</body>
</html>
